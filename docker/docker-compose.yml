version: '3.8'

services:
  wactl-primary:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: wactl-primary
    env_file: ../envs/primary.env
    volumes:
      - primary-data:/app/data
    ports:
      - "8080:8080"   # Admin panel
      - "3000:3000"   # MCP server
    restart: unless-stopped

  # Example second account (uncomment and configure)
