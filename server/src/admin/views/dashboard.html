<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wactl — Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0; padding: 1.5rem;
    }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .header h1 { font-size: 1.25rem; }
    .header h1 span { color: #22d3ee; }
    nav a { color: #94a3b8; text-decoration: none; margin-left: 1rem; font-size: 0.875rem; }
    nav a:hover { color: #e2e8f0; }
    nav a.active { color: #22d3ee; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
    .card {
      background: #1e293b; border-radius: 8px; padding: 1.25rem;
      border: 1px solid #334155;
    }
    .card h2 { font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
    .label { font-size: 0.875rem; color: #64748b; }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    .green { background: #22c55e; }
    .red { background: #ef4444; }
    .yellow { background: #eab308; }
    .update-list { margin-top: 0.5rem; font-size: 0.8rem; }
    .update-list li { list-style: none; padding: 0.3rem 0; border-bottom: 1px solid #334155; }
    #logout { color: #f87171; cursor: pointer; background: none; border: none; font-size: 0.875rem; }
    #logout:hover { color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>wactl</span> Dashboard</h1>
    <nav>
      <a href="" class="active" data-nav="/">Dashboard</a>
      <a href="" data-nav="/auth">QR Auth</a>
      <a href="" data-nav="/settings">Settings</a>
      <button id="logout">Logout</button>
    </nav>
  </div>
  <div class="grid">
    <div class="card">
      <h2>WhatsApp Connection</h2>
      <div class="stat" id="connStatus">Loading...</div>
      <div class="label" id="account"></div>
    </div>
    <div class="card">
      <h2>Uptime</h2>
      <div class="stat" id="uptime">—</div>
    </div>
    <div class="card">
      <h2>MCP Server</h2>
      <div class="stat" id="mcpStatus">Loading...</div>
      <div class="label" id="mcpClients"></div>
    </div>
    <div class="card">
      <h2>Update History</h2>
      <ul class="update-list" id="updateHistory">
        <li>Loading...</li>
      </ul>
    </div>
  </div>
  <script>
    const B = window.BASE_PATH || '';
    document.querySelectorAll('[data-nav]').forEach(a => a.href = B + a.getAttribute('data-nav'));
    async function refresh() {
      try {
        const res = await fetch(B + '/api/status');
        if (res.status === 401) { window.location.href = B + '/login'; return; }
        const data = await res.json();
        const dot = data.bridge.connected ? '<span class="status-dot green"></span>Connected' :
          data.bridge.loggedIn ? '<span class="status-dot yellow"></span>Needs QR Scan' :
          '<span class="status-dot red"></span>Disconnected';
        document.getElementById('connStatus').innerHTML = dot;
        document.getElementById('account').textContent = data.bridge.account || 'Not logged in';

        const secs = data.bridge.uptime || 0;
        const d = Math.floor(secs / 86400);
        const h = Math.floor((secs % 86400) / 3600);
        const m = Math.floor((secs % 3600) / 60);
        document.getElementById('uptime').textContent = d > 0 ? `${d}d ${h}h ${m}m` : `${h}h ${m}m`;

        document.getElementById('mcpStatus').innerHTML =
          `<span class="status-dot green"></span>Listening :${data.mcpPort}`;
        document.getElementById('mcpClients').textContent =
          `${data.mcpClients} connected client(s)`;

        const ul = document.getElementById('updateHistory');
        if (data.updateHistory && data.updateHistory.length > 0) {
          ul.innerHTML = data.updateHistory.slice(0, 10).map(u =>
            `<li>${new Date(u.timestamp).toLocaleDateString()} — ${u.action}: ${u.currentVersion} → ${u.latestVersion} (${u.result})</li>`
          ).join('');
        } else {
          ul.innerHTML = '<li>No update checks yet</li>';
        }
      } catch (e) {
        console.error('Refresh failed:', e);
      }
    }
    refresh();
    setInterval(refresh, 10000);

    document.getElementById('logout').addEventListener('click', async () => {
      await fetch(B + '/logout', { method: 'POST' });
      window.location.href = B + '/login';
    });
  </script>
</body>
</html>
